# .github/workflows/pypi-publish.yml

name: PyPI-Release

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 9 * * *' # Every day at 09:00 UTC
  workflow_dispatch:

jobs:
  discover:
    name: Discover Missing PyPI Releases
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.check-pypi.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check-pypi
        run: |
          # 1. Handle explicit tag push
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            if [[ "$TAG" == v* ]]; then
              echo "tags=[\"$TAG\"]" >> $GITHUB_OUTPUT
              echo "Triggered by push of tag $TAG"
              exit 0
            fi
          fi

          # 2. Handle scheduled/manual sync
          echo "Checking PyPI for quantnet-mq releases..."
          # Get list of versions from PyPI (handle missing package case)
          PYPI_VERSIONS=$(curl -s https://pypi.org/pypi/quantnet-mq/json | jq -r '.releases | keys[]' 2>/dev/null)
          
          MISSING_TAGS=()
          ALL_TAGS=$(git tag -l 'v*')
          
          for tag in $ALL_TAGS; do
            # Extract version from tag (e.g., v1.0.0 -> 1.0.0)
            VERSION=${tag#v}
            # Check if this exact version string exists in the PyPI release keys
            if ! echo "$PYPI_VERSIONS" | grep -qFx "$VERSION" > /dev/null 2>&1; then
              echo "Tag $tag (Version $VERSION) is missing on PyPI."
              MISSING_TAGS+=("$tag")
            else
              echo "Tag $tag (Version $VERSION) already exists on PyPI."
            fi
          done

          if [ ${#MISSING_TAGS[@]} -eq 0 ]; then
            echo "tags=[]" >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' "${MISSING_TAGS[@]}" | jq -R . | jq -s -c .)
            echo "tags=$JSON" >> $GITHUB_OUTPUT
            echo "Missing tags found: $JSON"
          fi

  build-and-publish:
    name: Publish ${{ matrix.tag }}
    needs: discover
    if: needs.discover.outputs.tags != '[]' && needs.discover.outputs.tags != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ${{ fromJson(needs.discover.outputs.tags || '[]') }}
      fail-fast: false

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Build package distributions
        run: python -m build

      - name: Publish package to PyPI using token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true

  test-install:
    name: Verify ${{ matrix.tag }}
    needs: build-and-publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ${{ fromJson(needs.discover.outputs.tags || '[]') }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version from source
        id: get_version
        run: |
          VERSION=$(python -c "from quantnet_mq import __version__; print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install package from PyPI
        run: |
          echo "Waiting 20 seconds for PyPI index to update..."
          sleep 20
          pip install "quantnet-mq==${{ steps.get_version.outputs.version }}"
          echo "Successfully installed quantnet-mq version ${{ steps.get_version.outputs.version }}"

      - name: Verify package installation
        run: |
          pip show quantnet-mq